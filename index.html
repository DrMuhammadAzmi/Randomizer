<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Picker: Pilihan Rawak Awak!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #2ed1d1; 
            --secondary: #9c27b0; 
            --background: linear-gradient(135deg, #e0f7f7 0%, #e1bee7 100%);
            --text: #2c3e50;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .wrapper {
            display: flex;
            gap: 25px;
            width: 100%;
            max-width: 950px;
            flex-wrap: wrap; 
            justify-content: center;
        }

        .main-card {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            flex: 2;
            min-width: 300px;
            text-align: center;
            position: relative;
        }

        .history-card {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 250px;
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: 28px; margin-bottom: 10px; color: var(--text); }
        h2 { font-size: 20px; margin-top: 0; color: var(--secondary); border-bottom: 2px dashed #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .subtitle { font-size: 16px; color: #7f8c8d; margin-bottom: 30px; }
        label { display: block; text-align: left; font-weight: 600; margin-bottom: 8px; font-size: 14px; }

        .upload-btn { display: block; margin-bottom: 15px; font-size: 14px; color: #7f8c8d; width: 100%; }
        .upload-btn::file-selector-button {
            background-color: #f0f2f5; border: 1px solid #dcdde1; padding: 8px 15px;
            border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 600;
            color: var(--text); transition: background-color 0.2s; margin-right: 10px;
        }
        .upload-btn::file-selector-button:hover { background-color: #e2e6ea; }

        textarea {
            width: 100%; height: 180px; padding: 15px; border-radius: 12px;
            border: 2px solid #e0e0e0; font-family: inherit; font-size: 14px;
            resize: none; box-sizing: border-box; transition: border-color 0.3s;
        }
        textarea:focus { border-color: var(--primary); outline: none; }

        .controls { margin-top: 25px; display: flex; gap: 10px; justify-content: center; align-items: center; }

        .pick-btn {
            background: linear-gradient(90deg, var(--primary) 0%, #29b6b6 100%);
            color: white; border: none; padding: 15px 35px; font-size: 18px;
            font-weight: 700; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 209, 209, 0.3); transition: transform 0.1s, box-shadow 0.2s;
        }
        .pick-btn:hover { box-shadow: 0 6px 20px rgba(46, 209, 209, 0.5); }
        .pick-btn:active { transform: translateY(2px); }
        .pick-btn:disabled { background: #bdc3c7; box-shadow: none; cursor: not-allowed; }

        .reset-btn {
            background-color: #f5f5f5; color: #7f8c8d; border: none;
            padding: 10px 20px; border-radius: 50px; font-size: 12px; cursor: pointer;
        }
        .reset-btn:hover { background-color: #e0e0e0; }

        #result-container { margin-top: 30px; min-height: 120px; position: relative; display: flex; justify-content: center; align-items: center;}

        #result {
            font-size: 30px; font-weight: 700; color: #7f8c8d;
            word-wrap: break-word; opacity: 0; transform: scale(0.8);
            transition: opacity 0.3s, transform 0.3s;
        }
        #result.show { opacity: 1; transform: scale(1); }
        
        #result.countdown-text {
            font-size: 80px;
            color: #e74c3c; 
            font-weight: 900;
        }

        #result.winner-text {
            font-size: 40px; 
            color: var(--primary);
            font-weight: 900;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }

        ul#historyList {
            list-style: none; padding: 0; margin: 0;
            overflow-y: auto; flex-grow: 1;
        }
        ul#historyList li {
            background-color: #f8f9fa; margin-bottom: 10px; padding: 12px 15px;
            border-radius: 10px; border-left: 5px solid var(--primary);
            font-weight: 600; font-size: 15px; color: #34495e;
            animation: slideIn 0.3s ease-out;
            display: flex; justify-content: space-between; align-items: center;
        }
        ul#historyList li span.badge {
            background-color: var(--secondary); color: white;
            font-size: 11px; padding: 3px 8px; border-radius: 20px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .footer {
            margin-top: 40px; font-size: 12px; color: #95a5a6;
            border-top: 1px solid #eee; padding-top: 15px; text-align: center;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="main-card">
            <h1>RANDOM PICKER</h1>
            <p class="subtitle">Cepat, Adil, & Fun! ✨</p>
            
            <label for="fileInput">Muat Naik Fail (.txt / .csv):</label>
            <input type="file" id="fileInput" accept=".txt,.csv" class="upload-btn">

            <label for="itemList">Atau tampal (paste) senarai pilihan di sini:</label>
            <textarea id="itemList" placeholder="Contoh:&#10;Ali&#10;Siti&#10;Muthu&#10;Buku Rujukan"></textarea>
            
            <div class="controls">
                <button class="pick-btn" id="pickBtn" onclick="pickRandom()">PILIH RAWAK! 🎲</button>
                <button class="reset-btn" onclick="resetPicker()">RESET LIST</button>
            </div>

            <div id="result-container">
                <div id="result"></div>
            </div>

            <div class="footer">Dikuasakan oleh JavaScript & GitHub Pages</div>
        </div>

        <div class="history-card">
            <h2>Senarai Pemenang 🏆</h2>
            <ul id="historyList"></ul>
        </div>
    </div>

    <script>
        let winnerCount = 0;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('itemList').value = event.target.result;
            };
            reader.readAsText(file);
        });

        function pickRandom() {
            const text = document.getElementById('itemList').value;
            const items = text.split('\n').filter(item => item.trim() !== '');
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('pickBtn');
            const historyList = document.getElementById('historyList');

            if (items.length === 0) {
                alert("Sila masukkan senarai pilihan atau muat naik fail terlebih dahulu! 😅");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sila Tunggu...";
            resultDiv.className = 'show'; 
            
            const shuffleDuration = 5000; 
            const endTime = Date.now() + shuffleDuration;

            function doShuffle() {
                if (Date.now() < endTime) {
                    const randomTemp = items[Math.floor(Math.random() * items.length)];
                    resultDiv.innerText = randomTemp;
                    
                    const randomInterval = Math.floor(Math.random() * (500 - 300 + 1)) + 300;
                    setTimeout(doShuffle, randomInterval);
                } else {
                    startCountdown();
                }
            }

            doShuffle();

            function startCountdown() {
                let count = 5;
                resultDiv.className = 'countdown-text show'; 
                resultDiv.innerText = count;

                const countInterval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        resultDiv.classList.remove('show');
                        setTimeout(() => resultDiv.classList.add('show'), 50);
                        resultDiv.innerText = count;
                    } else {
                        clearInterval(countInterval);
                        showFinalWinner();
                    }
                }, 1000);
            }

            function showFinalWinner() {
                const finalWinner = items[Math.floor(Math.random() * items.length)];
                
                resultDiv.className = 'winner-text show';
                resultDiv.innerText = finalWinner;
                
                // --- KESAN BUNGA API MERDEKA 🇲🇾 ---
                const merdekaColors = ['#ed1c24', '#003478', '#ffcc00', '#ffffff']; // Merah, Biru, Kuning, Putih
                const fireworksDuration = 3 * 1000; // Letup selama 3 saat
                const animationEnd = Date.now() + fireworksDuration;
                const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

                function randomInRange(min, max) {
                    return Math.random() * (max - min) + min;
                }

                const interval = setInterval(function() {
                    const timeLeft = animationEnd - Date.now();

                    if (timeLeft <= 0) {
                        return clearInterval(interval);
                    }

                    const particleCount = 50 * (timeLeft / fireworksDuration);
                    
                    // Tembak dari belah kiri
                    confetti(Object.assign({}, defaults, { 
                        particleCount, 
                        origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                        colors: merdekaColors
                    }));
                    
                    // Tembak dari belah kanan
                    confetti(Object.assign({}, defaults, { 
                        particleCount, 
                        origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                        colors: merdekaColors
                    }));
                }, 250);
                // -----------------------------------
                
                winnerCount++;
                const li = document.createElement('li');
                li.innerHTML = `${finalWinner} <span class="badge">#${winnerCount}</span>`;
                historyList.prepend(li);
                
                // Aktifkan butang selepas 3 saat (bila bunga api habis) supaya user tak kelam kabut klik
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = "PILIH RAWAK! 🎲";
                }, fireworksDuration);
            }
        }

        function resetPicker() {
            document.getElementById('itemList').value = '';
            document.getElementById('fileInput').value = ''; 
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = '';
            resultDiv.className = '';
        }
    </script>
</body>
</html>
