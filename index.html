<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Picker: Pilihan Rawak Awak!</title>
    <!-- Guna library Confetti luaran untuk effect gempak -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #2ed1d1; /* Teal */
            --secondary: #9c27b0; /* Purple */
            --background: linear-gradient(135deg, #e0f7f7 0%, #e1bee7 100%);
            --text: #2c3e50;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Ubah supaya kotak bermula dari atas */
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Container untuk susun kotak sebelah-sebelah */
        .wrapper {
            display: flex;
            gap: 25px;
            width: 100%;
            max-width: 950px;
            flex-wrap: wrap; /* Kalau skrin kecil, ia akan turun bawah automatik */
            justify-content: center;
        }

        .main-card {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            flex: 2;
            min-width: 300px;
            text-align: center;
            position: relative;
        }

        .history-card {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 250px;
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: 28px; margin-bottom: 10px; color: var(--text); }
        h2 { font-size: 20px; margin-top: 0; color: var(--secondary); border-bottom: 2px dashed #eee; padding-bottom: 10px; margin-bottom: 20px; }
        
        .subtitle { font-size: 16px; color: #7f8c8d; margin-bottom: 30px; }

        label { display: block; text-align: left; font-weight: 600; margin-bottom: 8px; font-size: 14px; }

        .upload-btn { display: block; margin-bottom: 15px; font-size: 14px; color: #7f8c8d; width: 100%; }
        .upload-btn::file-selector-button {
            background-color: #f0f2f5; border: 1px solid #dcdde1; padding: 8px 15px;
            border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 600;
            color: var(--text); transition: background-color 0.2s; margin-right: 10px;
        }
        .upload-btn::file-selector-button:hover { background-color: #e2e6ea; }

        textarea {
            width: 100%; height: 180px; padding: 15px; border-radius: 12px;
            border: 2px solid #e0e0e0; font-family: inherit; font-size: 14px;
            resize: none; box-sizing: border-box; transition: border-color 0.3s;
        }
        textarea:focus { border-color: var(--primary); outline: none; }

        .controls { margin-top: 25px; display: flex; gap: 10px; justify-content: center; align-items: center; }

        .pick-btn {
            background: linear-gradient(90deg, var(--primary) 0%, #29b6b6 100%);
            color: white; border: none; padding: 15px 35px; font-size: 18px;
            font-weight: 700; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 209, 209, 0.3); transition: transform 0.1s, box-shadow 0.2s;
        }
        .pick-btn:hover { box-shadow: 0 6px 20px rgba(46, 209, 209, 0.5); }
        .pick-btn:active { transform: translateY(2px); }
        .pick-btn:disabled { background: #bdc3c7; box-shadow: none; cursor: not-allowed; }

        .reset-btn {
            background-color: #f5f5f5; color: #7f8c8d; border: none;
            padding: 10px 20px; border-radius: 50px; font-size: 12px; cursor: pointer;
        }
        .reset-btn:hover { background-color: #e0e0e0; }

        #result-container { margin-top: 30px; min-height: 80px; position: relative; }

        #result {
            font-size: 36px; font-weight: 800; color: var(--primary);
            word-wrap: break-word; opacity: 0; transform: scale(0.8);
            transition: opacity 0.4s, transform 0.4s;
        }
        #result.show { opacity: 1; transform: scale(1); }

        /* Style untuk senarai pemenang */
        ul#historyList {
            list-style: none; padding: 0; margin: 0;
            overflow-y: auto; flex-grow: 1;
        }
        ul#historyList li {
            background-color: #f8f9fa; margin-bottom: 10px; padding: 12px 15px;
            border-radius: 10px; border-left: 5px solid var(--primary);
            font-weight: 600; font-size: 15px; color: #34495e;
            animation: slideIn 0.3s ease-out;
            display: flex; justify-content: space-between; align-items: center;
        }
        ul#historyList li span.badge {
            background-color: var(--secondary); color: white;
            font-size: 11px; padding: 3px 8px; border-radius: 20px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .footer {
            margin-top: 40px; font-size: 12px; color: #95a5a6;
            border-top: 1px solid #eee; padding-top: 15px; text-align: center;
        }
        .github-icon { margin-top: 10px; opacity: 0.6; }

    </style>
</head>
<body>

    <div class="wrapper">
        <!-- KOTAK UTAMA: PICKER -->
        <div class="main-card">
            <h1>RANDOM PICKER</h1>
            <p class="subtitle">Cepat, Adil, & Fun! ✨</p>
            
            <label for="fileInput">Muat Naik Fail (.txt / .csv):</label>
            <input type="file" id="fileInput" accept=".txt,.csv" class="upload-btn">

            <label for="itemList">Atau tampal (paste) senarai pilihan di sini:</label>
            <textarea id="itemList" placeholder="Contoh:&#10;Ali&#10;Siti&#10;Muthu&#10;Buku Rujukan"></textarea>
            
            <div class="controls">
                <button class="pick-btn" id="pickBtn" onclick="pickRandom()">PILIH RAWAK! 🎲</button>
                <button class="reset-btn" onclick="resetPicker()">RESET LIST</button>
            </div>

            <div id="result-container">
                <div id="result"></div>
            </div>

            <div class="footer">
                Dikuasakan oleh JavaScript & GitHub Pages
                <div class="github-icon">
                    <svg height="20" aria-hidden="true" viewBox="0 0 16 16" version="1.1" width="20"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
                </div>
            </div>
        </div>

        <!-- KOTAK KEDUA: SENARAI PEMENANG -->
        <div class="history-card">
            <h2>Senarai Pemenang 🏆</h2>
            <ul id="historyList">
                <!-- Nama pemenang akan masuk di sini secara dinamik -->
            </ul>
        </div>
    </div>

    <script>
        let winnerCount = 0;

        // Fungsi membaca fail
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('itemList').value = event.target.result;
            };
            reader.readAsText(file);
        });

        // Fungsi memilih secara rawak
        function pickRandom() {
            const text = document.getElementById('itemList').value;
            const items = text.split('\n').filter(item => item.trim() !== '');
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('pickBtn');
            const historyList = document.getElementById('historyList');

            if (items.length === 0) {
                alert("Sila masukkan senarai pilihan atau muat naik fail terlebih dahulu! 😅");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Tengah Pilih...";
            resultDiv.classList.remove('show');

            let counter = 0;
            const interval = setInterval(() => {
                const randomTemp = items[Math.floor(Math.random() * items.length)];
                resultDiv.innerText = randomTemp;
                resultDiv.style.opacity = "0.5";
                resultDiv.style.transform = "scale(0.9)";
                counter++;

                if (counter > 25) {
                    clearInterval(interval);
                    const finalWinner = items[Math.floor(Math.random() * items.length)];
                    
                    // Paparkan pemenang
                    resultDiv.innerText = finalWinner;
                    resultDiv.style.opacity = "1";
                    resultDiv.style.transform = "scale(1)";
                    resultDiv.classList.add('show');
                    
                    // Effect Confetti
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#2ed1d1', '#9c27b0', '#ffeb3b']
                    });
                    
                    // Tambah pemenang ke dalam senarai "History"
                    winnerCount++;
                    const li = document.createElement('li');
                    li.innerHTML = `${finalWinner} <span class="badge">#${winnerCount}</span>`;
                    
                    // prepend() digunakan supaya nama terbaru sentiasa berada di bahagian atas list
                    historyList.prepend(li);
                    
                    btn.disabled = false;
                    btn.innerText = "PILIH RAWAK! 🎲";
                }
            }, 40);
        }

        // Fungsi set semula kotak input sahaja
        function resetPicker() {
            document.getElementById('itemList').value = '';
            document.getElementById('fileInput').value = ''; 
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = '';
            resultDiv.classList.remove('show');
            // Nota: Senarai pemenang TIDAK dipadam. Ia hanya hilang jika browser ditutup.
        }
    </script>

</body>
</html>
